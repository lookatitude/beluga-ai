version: 2

builds:
  - id: beluga-cli
    main: ./cmd/beluga
    binary: beluga
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows/arm64 has no GitHub Actions runner without a self-hosted box;
      # deferred to S3. See specialist-devops-expert.md Q2.
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/lookatitude/beluga-ai/v2/cmd/beluga/internal/version.Version={{.Version}}
      - -X github.com/lookatitude/beluga-ai/v2/cmd/beluga/internal/version.Commit={{.Commit}}
      - -X github.com/lookatitude/beluga-ai/v2/cmd/beluga/internal/version.Date={{.Date}}

archives:
  - id: beluga-cli-archive
    ids:
      - beluga-cli
    name_template: "beluga_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))?\!?:.*$'
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))?\!?:.*$'
    - title: "Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))?\!?:.*$'
    - title: "Others"
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "merge"

release:
  github:
    owner: lookatitude
    name: beluga-ai
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
