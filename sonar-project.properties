sonar.projectKey=lookatitude_beluga-ai
sonar.organization=lookatitude
sonar.projectName=Beluga AI

sonar.sources=.
sonar.exclusions=**/*_test.go,**/testutil/**,**/vendor/**,docs/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage.out

# Coverage-only exclusions: these files are still analysed for issues,
# but are not measured against the new_coverage gate.
# - **/testdata/**: Go test fixtures, compiled as inputs to other tests
#   (e.g. `beluga run` CI matrix) but never executed by `go test -cover`.
# - **/*_windows.go and **/*_darwin.go: platform-gated build-tag files
#   that cannot be exercised by the Linux coverage job; Windows and
#   macOS paths are covered by the cross-OS CI integration matrix via
#   functional tests, not line-level coverage.
sonar.coverage.exclusions=**/testdata/**,**/*_windows.go,**/*_darwin.go

sonar.cpd.exclusions=**/providers/**

sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
