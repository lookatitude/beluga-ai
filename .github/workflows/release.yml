name: Release

# Release runs when:
# - A version tag (v*.*.*) is pushed, or
# - Manually from Actions with a tag and optional ref (default: main).
# It does NOT run automatically on push to main; create and push a tag to release.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3); required for manual run"
        required: true
      ref:
        description: "Ref to release from (branch or tag)"
        required: false
        default: "main"

env:
  GO_VERSION: "1.25.7"

jobs:
  create-tag:
    name: Create and push tag (manual only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Validate version format
        run: |
          V="${{ inputs.tag }}"
          if ! echo "$V" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must match vMAJOR.MINOR.PATCH (e.g. v2.1.1)"
            exit 1
          fi
          echo "Version format OK: $V"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.tag }} already exists — skipping creation (likely pushed by main.yml)"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}"
            git push origin "${{ inputs.tag }}"
          fi

  changes:
    name: Check Release-Relevant Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_needed: ${{ steps.filter.outputs.release_needed }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 2

      - name: Determine whether release should run
        id: filter
        run: |
          # Manual/dispatched: always run release (tag was explicitly requested)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Release requested for ${{ inputs.tag }}."
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}")

          if [ -z "${CHANGED_FILES}" ]; then
            echo "No changed files detected in tagged commit; skipping release."
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "${CHANGED_FILES}"

          RELEASE_RELEVANT=$(echo "${CHANGED_FILES}" | grep -Ev '^(\.github/|\.claude/)' || true)
          if [ -n "${RELEASE_RELEVANT}" ]; then
            echo "Release-relevant changes detected:"
            echo "${RELEASE_RELEVANT}"
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only .github/ or .claude/ changes detected; skipping release."
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
          fi

  changelog:
    name: Generate Changelog
    needs: [create-tag, changes]
    if: |
      always() &&
      needs.changes.outputs.release_needed == 'true' &&
      (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: .cliff.toml
          args: --output CHANGELOG.md ${{ github.event_name == 'workflow_dispatch' && format('--tag {0}', inputs.tag) || '' }}

      - name: Create PR for CHANGELOG.md
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ci/update-changelog
          base: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'main' }}
          delete-branch: true
          title: "chore(release): update CHANGELOG.md for ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          commit-message: "chore(release): update CHANGELOG.md for ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} [skip ci]"
          body: |
            Auto-generated changelog update for release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}.

            This PR was created automatically by the release workflow because branch protection
            prevents direct pushes to main.
          add-paths: |
            CHANGELOG.md

  release:
    name: GoReleaser
    needs: [create-tag, changes, changelog]
    if: |
      always() &&
      needs.changes.outputs.release_needed == 'true' &&
      (needs.changelog.result == 'success' || needs.changelog.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

  # Build the docs bundle (godoc HTML + generated reports with frontmatter)
  # and upload it as a release asset. The beluga-website repo downloads
  # docs-bundle.tar.gz from the latest release as part of its build.
  docs-bundle:
    name: Build and attach docs bundle
    needs: [changes, release]
    if: |
      always() &&
      needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install pkgsite
        run: go install golang.org/x/pkgsite/cmd/pkgsite@latest

      - name: Generate godoc HTML
        run: |
          mkdir -p bundle/godoc

          pkgsite -http=:8080 . &
          PKGSITE_PID=$!

          echo "Waiting for pkgsite to start..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "pkgsite ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: pkgsite failed to start after 60s"
              kill $PKGSITE_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          wget --mirror --convert-links --adjust-extension \
            --page-requisites --no-parent \
            --directory-prefix=bundle/godoc \
            --no-host-directories \
            --reject="robots.txt" \
            --reject-regex '.*\?.*' \
            --tries=3 --retry-connrefused \
            "http://localhost:8080/github.com/lookatitude/beluga-ai" 2>&1 || true

          kill $PKGSITE_PID 2>/dev/null || true

          find bundle/godoc -name '*[?*:<>"|]*' -delete 2>/dev/null || true

          FILE_COUNT=$(find bundle/godoc -type f | wc -l)
          echo "Generated ${FILE_COUNT} godoc files"

      - name: Prepare reports with Astro frontmatter
        run: |
          mkdir -p bundle/reports

          for f in CHANGELOG.md SECURITY.md CODE-QUALITY.md; do
            if [ ! -f "$f" ]; then
              echo "Skipping $f (not present at release tag)"
              continue
            fi

            slug=$(basename "$f" .md | tr '[:upper:]' '[:lower:]' | tr '_' '-')

            case "$slug" in
              changelog)    title="Changelog" ;;
              security)     title="Security" ;;
              code-quality) title="Code Quality" ;;
              *)            title="$slug" ;;
            esac

            {
              echo "---"
              echo "title: ${title}"
              echo "---"
              echo ""
              cat "$f"
            } > "bundle/reports/${slug}.md"

            echo "Prepared reports/${slug}.md"
          done

      - name: Create tarball
        run: |
          tar -C bundle -czf docs-bundle.tar.gz godoc reports
          ls -lh docs-bundle.tar.gz
          sha256sum docs-bundle.tar.gz | tee docs-bundle.tar.gz.sha256

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            docs-bundle.tar.gz \
            docs-bundle.tar.gz.sha256 \
            --clobber

  # After the bundle is attached, poke the beluga-website repo so it
  # rebuilds against the new asset.
  dispatch-website:
    name: Dispatch beluga-website rebuild
    needs: [docs-bundle]
    if: |
      always() &&
      needs.docs-bundle.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to beluga-website
        uses: peter-evans/repository-dispatch@v3
        with:
          # Requires a PAT (repo scope) stored as WEBSITE_DISPATCH_TOKEN
          # in this repo's secrets. GITHUB_TOKEN cannot dispatch across repos.
          token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          repository: lookatitude/beluga-website
          event-type: framework-release
          client-payload: |
            {
              "tag": "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}",
              "sha": "${{ github.sha }}"
            }
