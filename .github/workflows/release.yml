name: Release

# Release runs when:
# - A version tag (v*.*.*) is pushed, or
# - Manually from Actions with a tag and optional ref (default: main).
# It does NOT run automatically on push to main; create and push a tag to release.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3); required for manual run"
        required: true
      ref:
        description: "Ref to release from (branch or tag)"
        required: false
        default: "main"

env:
  GO_VERSION: "1.25.7"

jobs:
  create-tag:
    name: Create and push tag (manual only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Validate version format
        run: |
          V="${{ inputs.tag }}"
          if ! echo "$V" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must match vMAJOR.MINOR.PATCH (e.g. v2.1.1)"
            exit 1
          fi
          echo "Version format OK: $V"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.tag }} already exists — skipping creation (likely pushed by main.yml)"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}"
            git push origin "${{ inputs.tag }}"
          fi

  changes:
    name: Check Release-Relevant Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_needed: ${{ steps.filter.outputs.release_needed }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 2

      - name: Determine whether release should run
        id: filter
        run: |
          # Manual/dispatched: always run release (tag was explicitly requested)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Release requested for ${{ inputs.tag }}."
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}")

          if [ -z "${CHANGED_FILES}" ]; then
            echo "No changed files detected in tagged commit; skipping release."
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "${CHANGED_FILES}"

          RELEASE_RELEVANT=$(echo "${CHANGED_FILES}" | grep -Ev '^(\.github/|\.claude/|docs/website/)' || true)
          if [ -n "${RELEASE_RELEVANT}" ]; then
            echo "Release-relevant changes detected:"
            echo "${RELEASE_RELEVANT}"
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only .github/, .claude/, or docs/website/ changes detected; skipping release."
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
          fi

  changelog:
    name: Generate Changelog
    needs: [create-tag, changes]
    if: |
      always() &&
      needs.changes.outputs.release_needed == 'true' &&
      (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: .cliff.toml
          args: --output CHANGELOG.md ${{ github.event_name == 'workflow_dispatch' && format('--tag {0}', inputs.tag) || '' }}

      - name: Create PR for CHANGELOG.md
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ci/update-changelog
          base: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'main' }}
          delete-branch: true
          title: "chore(release): update CHANGELOG.md for ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          commit-message: "chore(release): update CHANGELOG.md for ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} [skip ci]"
          body: |
            Auto-generated changelog update for release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}.

            This PR was created automatically by the release workflow because branch protection
            prevents direct pushes to main.
          add-paths: |
            CHANGELOG.md

  release:
    name: GoReleaser
    needs: [create-tag, changes, changelog]
    if: |
      always() &&
      needs.changes.outputs.release_needed == 'true' &&
      (needs.changelog.result == 'success' || needs.changelog.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

  trigger-docs:
    name: Trigger Docs Rebuild
    needs: [changes, release]
    if: |
      always() &&
      needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Trigger documentation rebuild
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docs.yml',
              ref: 'main'
            });
