# Default values for beluga-operator.
# These values may be overridden by passing --set or -f <values-file> to helm install.

# replicaCount is the desired number of operator pod replicas.
replicaCount: 1

image:
  # repository is the container image repository.
  repository: ghcr.io/lookatitude/beluga-operator
  # pullPolicy controls when the kubelet pulls the image.
  # Options: Always, IfNotPresent, Never.
  pullPolicy: IfNotPresent
  # tag overrides the image tag. Defaults to the chart appVersion.
  tag: ""

# imagePullSecrets is a list of secret names used to pull private images.
imagePullSecrets: []

# nameOverride replaces the chart name portion of the generated resource names.
nameOverride: ""

# fullnameOverride replaces the full resource name prefix entirely.
fullnameOverride: ""

serviceAccount:
  # create controls whether a ServiceAccount is created for the operator.
  create: true
  # annotations to add to the ServiceAccount.
  annotations: {}
  # name is the ServiceAccount name to use. If empty and create=true, a name
  # is generated using the fullname helper.
  name: ""

# podAnnotations are added to each operator pod.
podAnnotations: {}

# podLabels are added to each operator pod in addition to the selector labels.
podLabels: {}

# podSecurityContext sets the pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# securityContext sets the container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

service:
  # type is the Kubernetes Service type.
  type: ClusterIP
  # port is the Service port exposed externally.
  port: 8080
  # targetPort is the container port the Service forwards to.
  targetPort: 8080

# nodeSelector constrains operator pods to nodes matching these labels.
nodeSelector: {}

# tolerations allow the operator pods to be scheduled on tainted nodes.
tolerations: []

# affinity rules for operator pod scheduling.
affinity: {}

# leaderElection controls whether leader election is enabled (recommended for HA).
leaderElection:
  enabled: true
  # namespace is the namespace used for the leader election lock.
  namespace: ""

# metrics configures Prometheus metrics exposure.
metrics:
  enabled: false
  port: 8081

# webhook configures the admission webhook server.
webhook:
  enabled: false
  port: 9443
  certDir: /tmp/k8s-webhook-server/serving-certs
