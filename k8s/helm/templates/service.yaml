apiVersion: v1
kind: Service
metadata:
  name: {{ include "beluga-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "beluga-operator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "beluga-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
    {{- if .Values.metrics.enabled }}
    - name: metrics
      protocol: TCP
      port: {{ .Values.metrics.port }}
      targetPort: metrics
    {{- end }}
    {{- if .Values.webhook.enabled }}
    - name: webhook
      protocol: TCP
      port: {{ .Values.webhook.port }}
      targetPort: webhook
    {{- end }}
